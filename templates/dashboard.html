{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

  <div class="card mb-4 shadow-sm">
    <div class="card-body d-flex align-items-center">
      <img src="{{ url_for('static', filename='hospital.jpg') }}" class="rounded-circle me-3" width="60">
      <div>
        <h4>Dr. {{ current_user.fullname }}</h4>
        <p class="text-muted">{{ current_user.specialization }}</p>
      </div>
    </div>
  </div>

  <div class="row">

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>📅 Appointments</h5>
          <p>Total: {{ appointments|length }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>📋 Patient Records</h5>
          <p>Total: {{ records|length }}</p>
          <a href="{{ url_for('main.add_patient_record') }}" class="btn btn-sm btn-primary">Add</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>🩺 Consultations</h5>
          <p>Total: {{ consultations|length }}</p>
        </div>
      </div>
    </div>

  </div>

</div>

{% endblock %}
